<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset your password</title>
</head>
<body style="font-family: Arial, sans-serif;">
    <h2>Hello, {{ username }}!</h2>
    <p>We received a request to reset your password.</p>
    <p>Use the link below to set a new password (valid for a limited time):</p>
    <p>
        <a href="{{ host }}/api/auth/reset_password?token={{ token }}"
           style="display:inline-block;padding:10px 18px;background:#dc2626;color:#fff;text-decoration:none;border-radius:6px;">
            Reset password
        </a>
    </p>
    <p>Reset token (use it in the POST /api/auth/reset_password body):</p>
    <p>{{ token }}</p>
    <p>If you didn't request this, ignore this email.</p>
</body>
</html>
