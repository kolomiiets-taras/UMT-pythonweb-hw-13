<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm your email</title>
</head>
<body style="font-family: Arial, sans-serif;">
    <h2>Hello, {{ username }}!</h2>
    <p>Thank you for registering with Contacts API.</p>
    <p>Please confirm your email address by clicking the link below:</p>
    <p>
        <a href="{{ host }}/api/auth/confirmed_email/{{ token }}"
           style="display:inline-block;padding:10px 18px;background:#2563eb;color:#fff;text-decoration:none;border-radius:6px;">
            Confirm email
        </a>
    </p>
    <p>If the button doesn't work, copy this link into your browser:</p>
    <p>{{ host }}/api/auth/confirmed_email/{{ token }}</p>
</body>
</html>
